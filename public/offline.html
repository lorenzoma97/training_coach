<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0B0F1A" />
    <title>Offline - Diario & Coach</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <style>
      :root {
        color-scheme: dark;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0B0F1A;
        color: #E2E8F0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      main {
        max-width: 420px;
        width: 100%;
        background: #16213E;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        padding: 28px 24px;
        text-align: center;
      }
      .icon {
        font-size: 44px;
        line-height: 1;
        margin-bottom: 12px;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 10px;
        color: #F1F5F9;
        font-weight: 700;
      }
      p {
        margin: 0 0 14px;
        color: #94A3B8;
        font-size: 14px;
        line-height: 1.55;
      }
      .hint {
        font-size: 12px;
        color: #64748B;
        margin-bottom: 20px;
      }
      button {
        padding: 12px 20px;
        background: linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%);
        border: none;
        border-radius: 10px;
        color: #FFF;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
        width: 100%;
        transition: opacity 0.15s;
      }
      button:hover { opacity: 0.9; }
      button:active { opacity: 0.75; }
    </style>
  </head>
  <body>
    <main role="main" aria-label="App offline">
      <div class="icon" aria-hidden="true">📡</div>
      <h1>Sei offline</h1>
      <p>Riconnettiti a internet per usare il coach AI e sincronizzare le ultime modifiche.</p>
      <p class="hint">Il diario locale resta accessibile appena la connessione torna disponibile: apri l'app normalmente.</p>
      <button type="button" onclick="window.location.reload()">Riprova</button>
    </main>
  </body>
</html>
