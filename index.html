<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <!-- Content Security Policy: difesa in profondità contro XSS.
         - default-src 'self': assets dal nostro origin.
         - script-src 'self' 'unsafe-inline': Vite inline piccoli script build-time; nessun CDN.
         - style-src 'self' 'unsafe-inline' https://fonts.googleapis.com: stili inline + Google Fonts CSS.
         - font-src 'self' https://fonts.gstatic.com: font Google.
         - img-src 'self' data:: icone inline + locali.
         - connect-src 'self' https:: fetch verso API LLM (Gemini/OpenAI/Anthropic) + future.
         - object-src 'none': blocca plugin Flash/Java.
         - base-uri 'self': blocca injection via <base>. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https:; object-src 'none'; base-uri 'self';" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Fallback icona per iOS homescreen. Non ottimale (iOS preferisce PNG)
         ma funziona su iOS >= 16 che accetta SVG come touch icon. Quando
         verranno generati i PNG (vedi TODO in vite.config.ts), aggiungere qui
         anche sizes specifici, es. <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png"/>. -->
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0B0F1A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Diario & Coach</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
